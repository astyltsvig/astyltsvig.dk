<style>

  .topbar{display:flex; justify-content:flex-end; padding-top:14px}

  .lang{border:none; background:none; font-weight:700; font-size:12.5px; padding:4px 12px; border-radius:999px; cursor:pointer; color:var(--muted)}

  .sub{color:var(--muted); font-size:14px}
  .views{display:flex; gap:6px; margin:12px 0 2px}
  .vbtn{flex:1; text-align:center; padding:9px; border:1px solid var(--line); background:var(--card);

  .vbtn.active{background:var(--ink); color:#fff; border-color:var(--ink)}

  .day{flex:1 0 auto; min-width:76px; text-align:center; border:1px solid var(--line);
    background:var(--card); border-radius:12px; padding:7px 6px; cursor:pointer; user-select:none}
  .day .dn{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em}
  .day .dd{font-size:19px; font-weight:700}
  .day.active{background:var(--ink); border-color:var(--ink); color:#fff}
  .day.active .dn{color:#c9c4bc}
  .filters{display:flex; flex-wrap:wrap; gap:6px; margin:11px 0 2px}
  .chip{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600;
    border:1px solid var(--line); background:var(--card); border-radius:999px; padding:6px 11px;
    cursor:pointer; user-select:none}

  .daymeta{font-size:12.5px; color:var(--muted); margin:13px 2px 6px}
  .grpsel{display:flex; align-items:center; gap:6px; margin:9px 0 2px; flex-wrap:wrap}

  .grpsel .gb{border:1px solid var(--line); background:var(--card); border-radius:999px; padding:5px 13px;

  .grpsel .gb.on{background:var(--in); color:#fff; border-color:var(--in)}
  .row{display:grid; grid-template-columns:60px 1fr; gap:10px; margin-bottom:8px}
  .time{text-align:right; padding-top:11px; font-variant-numeric:tabular-nums; font-size:13px;
    font-weight:700; white-space:nowrap}
  .time .to{display:block; font-size:11px; font-weight:500; color:var(--muted)}
  .card{position:relative; display:flex; gap:10px; background:var(--card); border:1px solid var(--line); border-left:5px solid var(--cc,#ccc);
    border-radius:11px; padding:9px 30px 9px 12px}
  .thumb{width:52px; height:52px; object-fit:cover; border-radius:8px; flex:0 0 auto; background:#eee}
  .cbody{flex:1; min-width:0}
  .card.exp{cursor:pointer}
  .ctag{font-size:10.5px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:var(--cc)}
  .title{font-size:14.5px; font-weight:650; margin:1px 0 3px; letter-spacing:-.01em}

  .maplink{display:inline-flex; align-items:center; gap:3px; text-decoration:none; background:#eef2ff;

  .night{background:#1e1b2e; color:#c4b5fd; border-radius:6px; padding:2px 7px; font-weight:700}
  .opt{background:#fff4d6; color:#8a6d10; border-radius:6px; padding:2px 7px; font-weight:700}

  .item .m b{color:#444; font-weight:600}
  .item .d{font-size:12.5px; color:#3a3a42}
  footer{margin-top:26px; padding-top:14px; border-top:1px solid var(--line); font-size:12px; color:var(--muted)}
  footer a{color:#3049c4; text-decoration:none; font-weight:600}
  /* favorites */
  .star{position:absolute; top:6px; right:8px; font-size:19px; line-height:1; color:#d9b400; cursor:pointer; user-select:none; opacity:.5}
  .star.on{opacity:1}
  /* min plan */
  .minhead{display:flex; justify-content:space-between; align-items:center; gap:10px; margin:14px 0 4px; flex-wrap:wrap}
  .minhead h2{font-size:17px; margin:0}
  .minsub{font-size:12.5px; color:var(--muted)}
  .printbtn{border:1px solid var(--ink); background:var(--ink); color:#fff; border-radius:10px; padding:8px 15px; font-weight:700; font-size:13px; cursor:pointer}
  .dayblock{margin-top:6px}
  .dayhd{font-size:13px; font-weight:800; letter-spacing:.02em; margin:16px 2px 8px; padding-bottom:5px; border-bottom:2px solid var(--line)}
  .pcard{position:relative; display:flex; gap:10px; align-items:flex-start; background:var(--card);
    border:1px solid var(--line); border-left:5px solid var(--cc,#ccc); border-radius:10px; padding:9px 30px 9px 12px; margin-bottom:7px}
  .pcard .ptime{flex:0 0 50px; text-align:right; padding-top:2px; font-variant-numeric:tabular-nums; font-weight:700; font-size:13px; white-space:nowrap}
  .pthumb{width:50px; height:50px; object-fit:cover; border-radius:8px; flex:0 0 auto; background:#eee}
  .pbody{flex:1; min-width:0}
  .pcard .ptime span{display:block; font-size:11px; font-weight:500; color:var(--muted)}
  .pcat{font-size:10px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:var(--cc)}
  .ptitle{font-size:14px; font-weight:650; margin:1px 0 2px; letter-spacing:-.01em}
  .pv{font-size:12px; color:var(--muted)}
  .pm{font-size:11.5px; color:var(--muted); margin-top:2px}
  .pd{font-size:12.5px; color:#3a3a42; margin-top:4px}
  .pn{font-size:12px; color:var(--muted); margin-top:3px}
  .premove{position:absolute; top:5px; right:7px; border:none; background:none; font-size:19px; line-height:1; color:#d9b400; cursor:pointer}
  @media(max-width:420px){h1{font-size:22px} .row{grid-template-columns:52px 1fr; gap:8px} .pcard{grid-template-columns:52px 1fr; gap:8px}}
  @media print{
    .topbar,.views,#view-tl,#view-cat,footer,.printbtn,.premove,.kicker{display:none !important}
    #view-min{display:block !important}
    body{background:#fff; color:#000}
    .wrap{max-width:none; padding:0 4px 10px}
    h1{font-size:19px; margin:0}
    .minhead{margin:2px 0 6px}
    .minsub{display:none}
    .pcard{break-inside:avoid; page-break-inside:avoid; border:1px solid #ccc; border-left:5px solid var(--cc,#ccc); box-shadow:none}
    .dayhd{break-after:avoid; page-break-after:avoid}
  }
</style>
</head>

  const cd=e.ref?C[e.ref]:null;
  return {cat:e.cat,start:s[0],end:s[1],tag:s[2],
    title:e.ref?L(cd.t):L(e.label),sub:e.ref?cd.fr:"",desc:e.ref?cDesc(cd):"",meta:e.ref?cMeta(cd):null,
    note:L(e.note),dur:e.dur,opt:e.opt,img:e.ref?cd.img:e.img,fav:`${ei}@${day}@${s[0]}`};
}
function updateMinTab(){
  const b=document.querySelector('.vbtn[data-v="min"]');
  if(b)b.textContent=`${UI[curLang].vMin}`+(FAVS.size?` (${FAVS.size})`:"");
}
function toggleFav(key,el){
  if(FAVS.has(key))FAVS.delete(key); else FAVS.add(key);
  saveFavs();
  if(el){const on=FAVS.has(key); el.classList.toggle("on",on); el.textContent=on?"★":"☆";}
  updateMinTab();
  if(curView==="min")renderMin();
}

function buildGroup(){
  const el=document.getElementById("grpsel");
  const opts=[["all",UI[curLang].all],["Hold A","Hold A"],["Hold B","Hold B"]];
  el.innerHTML=`<span class="gl">${UI[curLang].inTeam}</span>`+opts.map(o=>`<span class="gb ${curGroup===o[0]?'on':''}" data-g="${o[0]}">${o[1]}</span>`).join("");
  el.querySelectorAll(".gb").forEach(n=>n.onclick=()=>{curGroup=n.dataset.g;buildGroup();renderTL();});
}
function buildDays(){
  const el=document.getElementById("days");
  el.innerHTML=DAYS.map(d=>`<div class="day ${d.k===curDay?'active':''}" data-k="${d.k}"><div class="dn">${L(d.dn)}</div><div class="dd">${d.dd}</div></div>`).join("");
  el.querySelectorAll(".day").forEach(n=>n.onclick=()=>{curDay=n.dataset.k;buildDays();renderTL();});
}
function buildFilters(){
  const el=document.getElementById("filters");
  let h=Object.entries(CATS).map(([k,c])=>`<span class="chip ${(allMode||activeCats.has(k))?'':'off'}" data-k="${k}"><span class="dot" style="background:${c.color}"></span>${L(c.name)}</span>`).join("");
  if(!allMode)h+=`<span class="chip reset" data-reset="1">↺ ${UI[curLang].reset}</span>`;
  el.innerHTML=h;
  el.querySelectorAll(".chip").forEach(n=>n.onclick=()=>{
    if(n.dataset.reset){allMode=true;activeCats=new Set(Object.keys(CATS));}
    else{const k=n.dataset.k;
      if(allMode){allMode=false;activeCats=new Set([k]);}
      else{activeCats.has(k)?activeCats.delete(k):activeCats.add(k); if(activeCats.size===0)allMode=true;}
    }
    buildFilters();renderTL();
  });
}
function renderTL(){
  const items=[];
  for(let ei=0;ei<EV.length;ei++){
    const e=EV[ei];
    if(!(allMode||activeCats.has(e.cat)))continue;
    const slots=e.slots[curDay]; if(!slots)continue;
    for(const s of slots){
      if(curGroup!=="all" && s[2] && s[2]!==curGroup) continue;
      items.push(mkItem(e,ei,s,curDay));
    }
  }
  items.sort((a,b)=>toMin(a.start)-toMin(b.start)||a.cat.localeCompare(b.cat));
  const di=DAYS.find(d=>d.k===curDay);
  let html=`<div class="sechead">${UI[curLang].dayProgram} · ${L(di.full)}</div>`;
  if(!items.length){
    html+=`<div class="empty">${UI[curLang].empty}</div>`;
  }else{
    html+=items.map(it=>{
      const c=CATS[it.cat],night=isNight(it.start),hasDesc=!!(it.desc||it.meta),on=FAVS.has(it.fav);
      return `<div class="row"><div class="time">${it.start}<span class="to">${it.end}${night?' +1':''}</span></div>
      <div class="card ${hasDesc?'exp':''}" style="--cc:${c.color}" ${hasDesc?'onclick="this.classList.toggle(\'open\')"':''}>
        <span class="star ${on?'on':''}" title="Favorit" onclick="event.stopPropagation();toggleFav('${it.fav}',this)">${on?'★':'☆'}</span>
        ${it.img?`<img class="thumb" src="${it.img}" alt="" loading="lazy">`:''}
        <div class="cbody">
        <div class="ctag">${L(c.name)}</div>
        <div class="title">${it.title}${it.sub?` <span style="font-weight:400;color:var(--muted);font-size:12px">· ${it.sub}</span>`:''}</div>
        <div class="meta">
          <a class="maplink" href="${gmaps(VEN[c.ven])}" target="_blank" rel="noopener">📍 ${L(c.venue)}</a>
          ${it.dur?`<span>${it.dur}</span>`:''}
          ${it.tag?`<span class="grp">${it.tag}</span>`:''}
          ${it.opt?`<span class="opt">${UI[curLang].optional}</span>`:''}
          ${night?`<span class="night">${UI[curLang].afterMid}</span>`:''}
          <span>${c.pass}</span>
        </div>
        ${it.note?`<div class="meta" style="margin-top:4px"><span>${it.note}</span></div>`:''}
        ${hasDesc?`<div class="more">${UI[curLang].tapDesc}</div>
          <div class="desc">${it.meta?`<div class="dl" style="margin-bottom:4px">${it.meta.join(" · ")}</div>`:''}${it.desc||''}</div>`:''}
        </div>
      </div></div>`;
    }).join("");
  }
  document.getElementById("daymeta").textContent=UI[curLang].daymeta(items.length,L(di.full));
  document.getElementById("tl").innerHTML=html;
}

function renderMin(){
  const el=document.getElementById("view-min");
  let total=0;
  const blocks=DAYS.map(d=>{
    const items=[];
    for(let ei=0;ei<EV.length;ei++){
      const e=EV[ei],slots=e.slots[d.k]; if(!slots)continue;
      for(const s of slots){const key=`${ei}@${d.k}@${s[0]}`; if(FAVS.has(key))items.push(mkItem(e,ei,s,d.k));}
    }
    if(!items.length)return "";
    items.sort((a,b)=>toMin(a.start)-toMin(b.start)||a.cat.localeCompare(b.cat));
    total+=items.length;
    return `<div class="dayblock"><div class="dayhd">${L(d.full)}</div>`+items.map(planCardHTML).join("")+`</div>`;
  }).join("");
  let html=`<div class="minhead"><div><h2>${UI[curLang].myPlan}</h2><div class="minsub">${UI[curLang].planSub(total)}</div></div>`;
  if(total)html+=`<button class="printbtn" onclick="window.print()">${UI[curLang].printPDF}</button>`;
  html+=`</div>`;
  html+= total ? blocks : `<div class="empty">${UI[curLang].noFav}</div>`;
  el.innerHTML=html;
}
function planCardHTML(it){
  const c=CATS[it.cat],night=isNight(it.start);
  return `<div class="pcard" style="--cc:${c.color}">
    <div class="ptime">${it.start}<span>${it.end}${night?' +1':''}</span></div>
    ${it.img?`<img class="pthumb" src="${it.img}" alt="" loading="lazy">`:''}
    <div class="pbody">
      <div class="pcat">${L(c.name)}${it.tag?` · ${it.tag}`:''}${it.opt?` · ${UI[curLang].optional}`:''}${night?` · ${UI[curLang].afterMid}`:''}</div>
      <div class="ptitle">${it.title}${it.sub?` <span class="fr">· ${it.sub}</span>`:''}</div>
      <div class="pv">📍 ${L(c.venue)}${it.dur?` · ${it.dur}`:''} · ${c.pass}</div>
      ${it.meta?`<div class="pm">${it.meta.join(" · ")}</div>`:''}
      ${it.desc?`<div class="pd">${it.desc}</div>`:''}
      ${it.note?`<div class="pn">${it.note}</div>`:''}
    </div>
    <button class="premove" title="Fjern" onclick="toggleFav('${it.fav}')">★</button>
  </div>`;
}

const CAT_TEXT={
  da:{
    inH:"IN-teater", inLead:"La Comédie (salle 1) · Pass Festival. Hver forestilling spilles for Hold A og Hold B — du skal kun til ét tidspunkt.",
    offH:"OFF · L'Atelier", offLead:"L'Atelier · Pass Festival / Village. Hver forestilling spilles flere gange dagligt — se tidslinjen.",
    vilH:"Village – street & scene", vilLead:"Stade Delaune · Pass Festival / Village. Korte optrædener gennem hele dagen.",
    confH:"Konferencer", confLead:"Konferenceområdet · Pass Festival / Village · 45 min (medmindre andet).",
    cineH:"Film (konkurrence)", cineLead:"La Comédie (salle 2 & 3) · Pass Festival. Se tidslinjen for visningstider.",
    dpH:"Deaf Party", dpLead:"Village-scene · Pass Festival / Village / Deaf Party. Line-up med tider i tidslinjen.",
    venuesH:"📍 Steder i Reims", venuesLead:"Alle spillesteder ligger tæt samlet ved Chaussée Bocquaine. Tryk for at åbne i Google Maps.",
    openMaps:"Åbn i Google Maps",
  },
  en:{
    inH:"IN Theatre", inLead:"La Comédie (hall 1) · Festival Pass. Each show runs for Team A and Team B — you only attend one time slot.",
    offH:"OFF · L'Atelier", offLead:"L'Atelier · Festival Pass / Village. Each piece plays several times a day — see the timeline.",
    vilH:"Village – street & stage", vilLead:"Stade Delaune · Festival Pass / Village. Short performances throughout the day.",
    confH:"Conferences", confLead:"Conference area · Festival Pass / Village · 45 min (unless noted).",
    cineH:"Films (competition)", cineLead:"La Comédie (halls 2 & 3) · Festival Pass. See the timeline for screening times.",
    dpH:"Deaf Party", dpLead:"Village stage · Festival Pass / Village / Deaf Party. Line-up with times in the timeline.",
    venuesH:"📍 Venues in Reims", venuesLead:"All venues are clustered close together by Chaussée Bocquaine. Tap to open in Google Maps.",
    openMaps:"Open in Google Maps",
  },
};

function renderCat(){
  const el=document.getElementById("view-cat");
  const T=CAT_TEXT[curLang];
  const itemHTML=x=>`<div class="item imgitem" style="--cc:${CATS[x.cat].color}">
      ${x.img?`<img class="ithumb" src="${x.img}" alt="" loading="lazy">`:''}
      <div class="ibody">
      <div class="t">${L(x.t)}${x.fr?` <span class="fr">· ${x.fr}</span>`:''}</div>
      <div class="m">${cMeta(x).map(m=>`<span>${m}</span>`).join("")}</div>
      ${cDesc(x)?`<div class="d">${cDesc(x)}</div>`:''}</div></div>`;
  const dot=k=>`<span class="dot" style="background:${CATS[k].color}"></span>`;

  let html=`<div class="cat">`;

  html+=`<h2>${dot('in')}${T.inH}</h2><p class="lead">${T.inLead}</p>`;
  html+=["canterville","lastones","fifthwall","sleep","window","mercury","opening","awards"].map(id=>itemHTML(C[id])).join("");

  html+=`<h2>${dot('off')}${T.offH}</h2><p class="lead">${T.offLead}</p>`;
  html+=["offrails","elevator","listening","resonance","turbulence","legend"].map(id=>itemHTML(C[id])).join("");

  html+=`<h2>${dot('vil')}${T.vilH}</h2><p class="lead">${T.vilLead}</p>`;
  html+=["vv_group","followsigns","clownmara","jaymagic","johnsmith","flowtv","schoolcart"].map(id=>itemHTML(C[id])).join("");

  html+=`<h2>${dot('conf')}${T.confH}</h2><p class="lead">${T.confLead}</p>`;
  html+=CONF.map(c=>`<div class="item imgitem" style="--cc:${CATS.conf.color}">
      <img class="ithumb" src="${c.img}" alt="" loading="lazy">
      <div class="ibody">
      <div class="t">${c.t}</div>
      <div class="m"><span><b>${L(DAYS.find(d=>d.k===c.day).dn)} ${c.s}–${c.e}</b></span><span>${c.who}</span><span>${curLang==="en"?c.coEn:c.co}</span></div></div></div>`).join("");

  html+=`<h2>${dot('cine')}${T.cineH}</h2><p class="lead">${T.cineLead}</p>`;
  html+=FILMS.map(g=>`<div style="margin:6px 0 2px;font-weight:700;font-size:13px">${L(g.sec)}</div>`+
     g.items.map(f=>`<div class="item" style="--cc:${CATS.cine.color}">
        <div class="t">${f[0]}</div>
        <div class="m"><span>${f[1]}</span><span>${curLang==="en"?trCo(f[2]):f[2]}</span><span>${f[3]}</span></div></div>`).join("")).join("");

  html+=`<h2>${dot('dp')}${T.dpH}</h2><p class="lead">${T.dpLead}</p>`;
  html+=["dp_signmark","dp_slobo","dp_aloss","dp_maxx","dp_vinz","dp_nuvis","dp_elements","dp_poster","dp_fila","dp_hcr","dp_signslam"].map(id=>itemHTML(C[id])).join("");

  html+=`<h2>${T.venuesH}</h2><p class="lead">${T.venuesLead}</p>`;
  const venueUse={
    comedie:{da:"IN-teater · cinema · ceremonier",en:"IN theatre · cinema · ceremonies"},
    atelier:{da:"OFF-forestillinger",en:"OFF performances"},
    village:{da:"Village: konferencer · street · Deaf Party",en:"Village: conferences · street · Deaf Party"},
  };
  html+=["comedie","atelier","village"].map(id=>{const v=VEN[id];return `<div class="item" style="--cc:#334155">
      <div class="t">${v.n}</div>
      <div class="m"><span>${v.a}</span><span>${L(venueUse[id])}</span></div>
      <a class="maplink" style="margin-top:5px" href="${gmaps(v)}" target="_blank" rel="noopener">📍 ${T.openMaps}</a></div>`;}).join("");

  html+=`</div>`;
  el.innerHTML=html;
}

function setView(v){
  curView=v;
  document.querySelectorAll(".vbtn").forEach(b=>b.classList.toggle("active",b.dataset.v===v));
  document.getElementById("view-tl").style.display = v==="tl"?"":"none";
  document.getElementById("view-cat").style.display = v==="cat"?"":"none";
  document.getElementById("view-min").style.display = v==="min"?"":"none";
  if(v==="min")renderMin();
}
document.querySelectorAll(".vbtn").forEach(b=>b.onclick=()=>setView(b.dataset.v));

function applyLang(){
  const u=UI[curLang];
  document.documentElement.lang=curLang;
  document.title=u.title;
  document.getElementById("kicker").textContent=u.kicker;
  document.getElementById("sub").textContent=u.sub;
  document.querySelector('.vbtn[data-v="tl"]').textContent=u.vTL;
  document.querySelector('.vbtn[data-v="cat"]').textContent=u.vCat;
  updateMinTab();
  document.getElementById("footer").innerHTML=u.footer;
  document.querySelectorAll("#langsel .lang").forEach(b=>b.classList.toggle("active",b.dataset.l===curLang));
  buildDays();buildFilters();buildGroup();renderTL();renderCat();renderMin();
}
document.querySelectorAll("#langsel .lang").forEach(b=>b.onclick=()=>{curLang=b.dataset.l;applyLang();});

applyLang();
</script>
</body>
</html>
