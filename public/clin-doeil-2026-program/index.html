<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clin d'Oeil 2026 · Program & tidslinje</title>
<meta name="description" content="Fuld dag-for-dag tidslinje for tegnsprogsfestivalen Clin d'Oeil 2026 i Reims (2.–5. juli): IN-teater, OFF, Village, konferencer, film og Deaf Party med line-up og tider. Dansk & engelsk.">
<meta name="theme-color" content="#ea580c">
<meta name="robots" content="index,follow">
<meta property="og:type" content="website">
<meta property="og:title" content="Clin d'Oeil 2026 · Program & tidslinje">
<meta property="og:description" content="Dag-for-dag oversigt over Clin d'Oeil 2026 i Reims — forestillinger, talks, film og Deaf Party.">
<meta name="twitter:card" content="summary">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23ea580c'/><circle cx='16' cy='16' r='6.5' fill='none' stroke='white' stroke-width='2.4'/><circle cx='16' cy='16' r='2.2' fill='white'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f2ea; --bg2:#ece5d8; --surface:#fff; --ink:#1b1a20; --muted:#77727c; --line:#e9e2d6;
    --accent:#ea5a1f;
    --in:#7c3aed; --off:#0d9488; --vil:#ea580c; --conf:#2563eb; --cine:#dc2626; --dp:#db2777;
    --sh-sm:0 1px 2px rgba(30,25,20,.05);
    --sh:0 2px 6px rgba(30,25,20,.05), 0 14px 30px -16px rgba(30,25,20,.22);
    --font:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --disp:'Fraunces',Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--font);
    -webkit-font-smoothing:antialiased; line-height:1.45;
    background-image:linear-gradient(180deg,#fbeadf 0%, rgba(251,234,223,0) 320px); background-repeat:no-repeat}
  .wrap{max-width:820px; margin:0 auto; padding:0 15px 80px}
  /* hero */
  .hero{padding:20px 0 4px}
  .hero-top{display:flex; justify-content:space-between; align-items:center; gap:12px}
  .kicker{display:inline-flex; align-items:center; gap:8px; font-weight:700; font-size:12px;
    letter-spacing:.16em; text-transform:uppercase; color:var(--accent)}
  .kicker::before{content:""; width:22px; height:2px; background:var(--accent); border-radius:2px}
  .htools{display:flex; align-items:center; gap:8px}
  .sharebtn{display:inline-flex; align-items:center; gap:5px; border:1px solid var(--line); background:var(--surface);
    color:var(--ink); border-radius:999px; padding:6px 13px; font-weight:700; font-size:12.5px; cursor:pointer; box-shadow:var(--sh-sm)}
  .langsel{display:inline-flex; gap:2px; background:var(--surface); border:1px solid var(--line);
    border-radius:999px; padding:3px; box-shadow:var(--sh-sm)}
  .lang{border:none; background:none; font-weight:700; font-size:12px; padding:5px 13px; border-radius:999px; cursor:pointer; color:var(--muted)}
  .lang.active{background:var(--ink); color:#fff}
  h1{font-family:var(--disp); font-weight:600; font-size:41px; line-height:1.02; letter-spacing:-.02em; margin:14px 0 7px}
  .sub{color:var(--muted); font-size:14.5px; font-weight:500}
  /* view toggle (segmented) */
  .views{display:flex; gap:5px; margin:18px 0 4px; background:var(--bg2); border-radius:14px; padding:5px}
  .vbtn{flex:1; text-align:center; padding:10px 8px; border:none; background:none; border-radius:10px;
    font-weight:700; font-size:14px; cursor:pointer; color:var(--muted); transition:.15s}
  .vbtn.active{background:var(--surface); color:var(--ink); box-shadow:var(--sh-sm)}
  /* day tabs */
  .days{display:flex; gap:7px; position:sticky; top:0; z-index:20; background:var(--bg); padding:12px 0 10px; overflow-x:auto}
  .day{flex:1 0 auto; min-width:80px; text-align:center; border:1px solid var(--line); background:var(--surface);
    border-radius:14px; padding:8px 6px; cursor:pointer; user-select:none; box-shadow:var(--sh-sm); transition:.15s}
  .day .dn{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font-weight:600}
  .day .dd{font-size:20px; font-weight:700; font-family:var(--disp)}
  .day.active{background:var(--ink); border-color:var(--ink); color:#fff}
  .day.active .dn{color:#bdb8c4}
  .filters{display:flex; flex-wrap:wrap; gap:7px; margin:12px 0 2px}
  .chip{display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600;
    border:1px solid var(--line); background:var(--surface); border-radius:999px; padding:7px 13px;
    cursor:pointer; user-select:none; box-shadow:var(--sh-sm); transition:.12s}
  .chip .dot{width:9px; height:9px; border-radius:50%}
  .chip.off{opacity:.42; box-shadow:none}
  .chip.off .dot{background:#c3bdb2 !important}
  .chip.reset{border-color:var(--ink); color:var(--ink); font-weight:700; box-shadow:none}
  .daymeta{font-size:12.5px; color:var(--muted); margin:14px 2px 8px; font-weight:500}
  .grpsel{display:flex; align-items:center; gap:7px; margin:10px 0 2px; flex-wrap:wrap}
  .grpsel .gl{color:var(--muted); font-weight:600; font-size:12.5px; margin-right:2px}
  .grpsel .gb{border:1px solid var(--line); background:var(--surface); border-radius:999px; padding:6px 14px;
    font-weight:700; font-size:12.5px; cursor:pointer; user-select:none; box-shadow:var(--sh-sm)}
  .grpsel .gb.on{background:var(--in); color:#fff; border-color:var(--in)}
  /* timeline */
  .row{display:grid; grid-template-columns:54px 1fr; gap:12px; margin-bottom:11px}
  .time{text-align:right; padding-top:15px; font-variant-numeric:tabular-nums; font-size:13px; font-weight:700; white-space:nowrap}
  .time .to{display:block; font-size:11px; font-weight:500; color:var(--muted)}
  .card{position:relative; display:flex; gap:13px; background:var(--surface); border:1px solid var(--line);
    border-radius:16px; padding:12px 36px 12px 15px; box-shadow:var(--sh); transition:.15s}
  .card::before{content:""; position:absolute; left:0; top:14px; bottom:14px; width:4px; border-radius:0 4px 4px 0; background:var(--cc,#ccc)}
  .thumb{width:88px; height:88px; object-fit:cover; border-radius:12px; flex:0 0 auto; background:#eee}
  .cbody{flex:1; min-width:0}
  .card.exp{cursor:pointer}
  .ctag{font-size:10.5px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--cc)}
  .title{font-size:15.5px; font-weight:600; margin:3px 0 5px; letter-spacing:-.01em; line-height:1.25}
  .meta{display:flex; flex-wrap:wrap; gap:6px 8px; font-size:12px; color:var(--muted); align-items:center}
  .maplink{display:inline-flex; align-items:center; gap:3px; text-decoration:none; background:#eef1ff;
    color:#3a4bd0; border-radius:7px; padding:3px 9px; font-weight:600; font-size:11.5px}
  .maplink:active{opacity:.65}
  .grp{background:#efeafd; color:#6d28d9; border-radius:7px; padding:3px 8px; font-weight:700; font-size:11.5px}
  .night{background:#211d33; color:#c4b5fd; border-radius:7px; padding:3px 8px; font-weight:700; font-size:11.5px}
  .nowb{background:#16a34a; color:#fff; border-radius:7px; padding:3px 8px; font-weight:800; font-size:11px; letter-spacing:.03em}
  .warnb{display:inline-block; background:#fdeaea; color:#b23838; border-radius:7px; padding:3px 9px; font-weight:700; font-size:11.5px; margin-top:5px}
  .pcard.warn{border-color:#e7b9b9}
  .plan-warn{background:#fdeaea; color:#b23838; border:1px solid #f2caca; border-radius:11px; padding:8px 13px; font-weight:700; font-size:12.5px; margin:0 0 10px}
  /* kommentarer */
  .cmt-toggle{cursor:pointer}
  .cmts{margin-top:9px; border-top:1px dashed var(--line); padding-top:9px}
  .cmt{background:#faf7f1; border:1px solid var(--line); border-radius:10px; padding:8px 11px; margin-bottom:6px; font-size:12.5px; line-height:1.5}
  .cmt b{font-size:12px}
  .cmt-at{color:var(--muted); font-size:11px; margin-left:5px}
  .cmt-empty,.cmt-load,.cmt-err{color:var(--muted); font-size:12.5px; padding:4px 0 6px}
  .cmt-form{display:flex; flex-direction:column; gap:6px; margin-top:8px}
  .cmt-form input[type=text],.cmt-form textarea{border:1px solid var(--line); border-radius:9px; padding:8px 11px;
    font-family:var(--font); font-size:13px; background:#fff; color:var(--ink); resize:vertical}
  .cmt-form textarea{min-height:56px}
  .cmt-form button{align-self:flex-end; border:none; background:var(--ink); color:#fff; border-radius:9px;
    padding:7px 16px; font-weight:700; font-size:12.5px; cursor:pointer}
  .cmt-form button:disabled{opacity:.5}
  .cmt-hp{position:absolute; left:-9999px; width:1px; height:1px; opacity:0}
  .card.live{border-color:#16a34a; box-shadow:0 0 0 1px #16a34a33, var(--sh)}
  /* praktisk info */
  .pinfo{display:flex; gap:12px; align-items:flex-start; background:var(--surface); border:1px solid var(--line);
    border-radius:16px; padding:13px 15px; margin-bottom:9px; box-shadow:var(--sh)}
  .pinfo .pic{font-size:22px; line-height:1.2; flex:0 0 auto}
  .pinfo .pt{font-size:14px; font-weight:700; margin-bottom:2px}
  .pinfo .pb{font-size:13px; color:#413f49; line-height:1.55}
  .pinfo a{color:#3a4bd0; font-weight:600; text-decoration:none}
  .opt{background:#fff2d1; color:#8a6d10; border-radius:7px; padding:3px 8px; font-weight:700; font-size:11.5px}
  .desc{margin-top:9px; font-size:13px; color:#413f49; border-top:1px dashed var(--line); padding-top:9px; display:none; line-height:1.5}
  .card.open .desc{display:block}
  .desc .dl{color:var(--muted)}
  .more{font-size:11px; color:var(--cc); font-weight:700; margin-top:6px}
  .sechead{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:700; margin:18px 2px 9px}
  .empty{text-align:center; color:var(--muted); padding:44px 0; font-size:13.5px}
  /* catalog */
  .cat h2{font-family:var(--disp); font-weight:600; font-size:22px; margin:26px 0 5px; display:flex; align-items:center; gap:9px; letter-spacing:-.01em}
  .cat h2 .dot{width:12px;height:12px;border-radius:50%}
  .cat .lead{font-size:13px; color:var(--muted); margin:0 0 12px; line-height:1.5}
  .item{position:relative; background:var(--surface); border:1px solid var(--line); border-radius:16px;
    padding:12px 14px; margin-bottom:9px; box-shadow:var(--sh); overflow:hidden}
  .item::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--cc)}
  .item.imgitem{display:flex; gap:13px; align-items:flex-start}
  .ithumb{width:112px; height:112px; object-fit:cover; border-radius:12px; flex:0 0 auto; background:#eee}
  .ibody{flex:1; min-width:0}
  .item .t{font-size:15.5px; font-weight:600; letter-spacing:-.01em}
  .item .fr{font-size:12.5px; color:var(--muted); font-style:italic; font-weight:400}
  .item .m{font-size:11.5px; color:var(--muted); margin:4px 0 6px; display:flex; flex-wrap:wrap; gap:4px 9px}
  .item .m b{color:#3a3843; font-weight:600}
  .item .d{font-size:13px; color:#413f49; line-height:1.5}
  footer{margin-top:34px; padding-top:18px; border-top:1px solid var(--line); font-size:12.5px; color:var(--muted); line-height:1.6}
  /* favorites */
  .star{position:absolute; top:9px; right:10px; font-size:22px; line-height:1; color:#e8a900; cursor:pointer; user-select:none; opacity:.42}
  .star.on{opacity:1}
  /* min plan */
  .minhead{display:flex; justify-content:space-between; align-items:center; gap:12px; margin:16px 0 6px; flex-wrap:wrap}
  .minhead h2{font-family:var(--disp); font-weight:600; font-size:24px; margin:0}
  .minsub{font-size:13px; color:var(--muted)}
  .printbtn{border:none; background:var(--ink); color:#fff; border-radius:11px; padding:10px 17px; font-weight:700; font-size:13.5px; cursor:pointer; box-shadow:var(--sh-sm)}
  .printbtn.alt{background:var(--surface); color:var(--ink); border:1px solid var(--ink)}
  .mactions{display:flex; gap:8px; flex-wrap:wrap}
  .minmode{display:flex; gap:6px; margin:6px 0 10px; flex-wrap:wrap}
  .minmode .mm{border:1px solid var(--line); background:var(--surface); border-radius:999px; padding:7px 14px; font-weight:700; font-size:12.5px; cursor:pointer; box-shadow:var(--sh-sm)}
  .minmode .mm.on{background:var(--ink); color:#fff; border-color:var(--ink)}
  #toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(12px); background:var(--ink); color:#fff;
    padding:11px 18px; border-radius:12px; font-weight:600; font-size:13.5px; box-shadow:var(--sh); opacity:0; pointer-events:none; transition:.25s; z-index:60}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .dayblock{margin-top:8px}
  .dayhd{font-family:var(--disp); font-weight:600; font-size:18px; margin:20px 2px 10px; padding-bottom:7px; border-bottom:2px solid var(--line)}
  .pcard{position:relative; display:flex; gap:12px; align-items:flex-start; background:var(--surface);
    border:1px solid var(--line); border-radius:14px; padding:11px 32px 11px 15px; margin-bottom:8px; box-shadow:var(--sh); overflow:hidden}
  .pcard::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--cc,#ccc)}
  .pcard .ptime{flex:0 0 50px; text-align:right; padding-top:2px; font-variant-numeric:tabular-nums; font-weight:700; font-size:13px; white-space:nowrap}
  .pthumb{width:76px; height:76px; object-fit:cover; border-radius:11px; flex:0 0 auto; background:#eee}
  .pbody{flex:1; min-width:0}
  .pcard .ptime span{display:block; font-size:11px; font-weight:500; color:var(--muted)}
  .pcat{font-size:10.5px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--cc)}
  .ptitle{font-size:15px; font-weight:600; margin:2px 0 3px; letter-spacing:-.01em}
  .pv{font-size:12px; color:var(--muted)}
  .pm{font-size:11.5px; color:var(--muted); margin-top:3px}
  .pd{font-size:12.5px; color:#413f49; margin-top:5px; line-height:1.45}
  .pn{font-size:12px; color:var(--muted); margin-top:3px}
  .premove{position:absolute; top:8px; right:9px; border:none; background:none; font-size:22px; line-height:1; color:#e8a900; cursor:pointer}
  /* smooth touch */
  .card,.item,.pcard{transition:box-shadow .3s cubic-bezier(.2,.7,.2,1), transform .3s cubic-bezier(.2,.7,.2,1)}
  .thumb,.ithumb,.pthumb{box-shadow:inset 0 0 0 1px rgba(20,15,10,.06); transition:transform .45s cubic-bezier(.2,.7,.2,1)}
  .card,.item,.pcard{will-change:transform}
  .card:active,.item:active,.pcard:active{transform:translateY(0) scale(.997)}
  .day,.chip,.vbtn,.lang,.printbtn{transition:transform .18s ease, background .18s ease, color .18s ease, box-shadow .18s ease}
  /* guide */
  .guide{position:relative; background:linear-gradient(135deg,#ffffff,#fdf4ea); border:1px solid var(--line);
    border-radius:16px; padding:14px 16px; margin:10px 0 2px; box-shadow:var(--sh-sm); font-size:13px; color:#4b4753}
  .guide h3{font-family:var(--disp); font-weight:600; font-size:17px; margin:0 0 7px; letter-spacing:-.01em}
  .guide ul{margin:0; padding-left:19px; line-height:1.65}
  .guide li+li{margin-top:3px}
  .guide b{color:var(--ink)}
  .gclose{position:absolute; top:10px; right:12px; border:none; background:none; font-size:15px; color:var(--muted); cursor:pointer; line-height:1; padding:4px}
  @media(hover:hover){
    .card:hover,.item:hover,.pcard:hover{transform:translateY(-2px); box-shadow:0 6px 14px rgba(30,25,20,.07), 0 26px 46px -20px rgba(30,25,20,.32)}
    .card:hover .thumb,.item:hover .ithumb,.pcard:hover .pthumb{transform:scale(1.06)}
    .day:hover,.chip:hover{transform:translateY(-1px)}
    .vbtn:hover{color:var(--ink)}
    .printbtn:hover{transform:translateY(-1px)}
  }
  @media(max-width:480px){
    h1{font-size:32px}
    .row{grid-template-columns:46px 1fr; gap:9px}
    .time{padding-top:13px; font-size:12.5px}
    .thumb{width:72px; height:72px}
    .ithumb{width:88px; height:88px}
    .card{padding:11px 30px 11px 12px; gap:11px}
  }
  @media print{
    .hero-top,.views,#view-tl,#view-cat,footer,.printbtn,.premove,.minmode{display:none !important}
    #view-min{display:block !important}
    body{background:#fff; color:#000; background-image:none}
    .wrap{max-width:none; padding:0 4px 10px}
    h1{font-size:23px; margin:0}
    .minhead{margin:2px 0 8px}
    .minsub{display:none}
    .pcard{break-inside:avoid; page-break-inside:avoid; box-shadow:none}
    .pthumb{width:64px; height:64px}
    .dayhd{break-after:avoid; page-break-after:avoid}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="hero-top">
      <div class="kicker" id="kicker">Festival · Reims</div>
      <div class="htools">
        <button class="sharebtn" id="sharePageBtn" onclick="sharePage()">⤴ Del</button>
        <div class="langsel" id="langsel">
          <button class="lang active" data-l="da">DA</button>
          <button class="lang" data-l="en">EN</button>
          <button class="lang" data-l="fr">FR</button>
        </div>
      </div>
    </div>
    <h1>Clin d'Oeil 2026</h1>
    <div class="sub" id="sub">Torsdag 2. – søndag 5. juli · international tegnsprogsfestival</div>
  </header>

  <div class="views">
    <div class="vbtn active" data-v="tl">Tidslinje</div>
    <div class="vbtn" data-v="cat">Fuldt program</div>
    <div class="vbtn" data-v="min">Min plan</div>
  </div>

  <div id="view-tl">
    <div class="guide" id="guide"></div>
    <div class="days" id="days"></div>
    <div class="filters" id="filters"></div>
    <div class="grpsel" id="grpsel"></div>
    <div class="daymeta" id="daymeta"></div>
    <div id="tl"></div>
  </div>

  <div id="view-cat" style="display:none"></div>

  <div id="view-min" style="display:none"></div>

  <footer id="footer"></footer>
</div>

<script>
/* ---------- UI strings ---------- */
const UI = {
  da:{
    title:"Clin d'Oeil 2026 · Program & tidslinje",
    kicker:"Festival · Reims",
    sub:"Torsdag 2. – søndag 5. juli · international tegnsprogsfestival",
    vTL:"Tidslinje", vCat:"Fuldt program", vMin:"Min plan",
    inTeam:"IN-hold:", all:"Alle", reset:"Nulstil",
    dayProgram:"Dagens program",
    empty:"Ingen programpunkter med de valgte filtre.",
    daymeta:(n,day)=>`${day} · ${n} programpunkter`,
    tapDesc:"Tryk for detaljer ▾",
    optional:"Valgfri",
    afterMid:"efter midnat",
    myPlan:"Min plan",
    planSub:(n)=>`${n} valgte punkter · gemt i din browser`,
    printPDF:"🖨 Print / Gem som PDF",
    noFav:"Du har ingen favoritter endnu. Tryk på ★ ved et programpunkt i tidslinjen for at føje det til din plan.",
    guideTitle:"Sådan bruger du siden",
    guide:["Skift mellem <b>Tidslinje</b>, <b>Fuldt program</b> og <b>Min plan</b> øverst.",
      "Vælg en dag, og filtrér på kategori — tryk én for kun den, tilføj flere, eller tryk <b>↺ Nulstil</b>.",
      "Tryk <b>★</b> på et punkt for at gemme det i <b>Min plan</b> — som du kan printe eller gemme som PDF.",
      "Tryk på et kort for beskrivelse. Skift sprog med <b>DA / EN / FR</b>."],
    hide:"Skjul",
    share:"Del", sharePlan:"📤 Del min plan", copied:"Link kopieret ✓",
    addToPlan:"➕ Tilføj til min plan", sharedPlan:"Delt plan",
    namePrompt:"Dit navn (valgfrit) — vises for dem du deler med:", added:"Tilføjet til din plan ✓",
    emptyShared:"Den delte plan er tom.",
    now:"● NU", fav:"Favorit", remove:"Fjern",
    conflict:"⚠ Tidskonflikt", conflictWith:t=>`⚠ Overlapper med “${t}”`,
    dup:"⚠ Samme forestilling valgt flere gange", dupShort:"⚠ Valgt flere gange",
    conflictSummary:n=>`⚠ ${n} tidskonflikt${n>1?"er":""} i planen`,
    comments:"Kommentarer", cmtLoading:"Indlæser…", cmtUnavailable:"Kommentarer er ikke tilgængelige lige nu.",
    cmtEmpty:"Ingen kommentarer endnu — vær den første! 🤟", cmtAnon:"Anonym",
    cmtName:"Navn (valgfrit)", cmtPlaceholder:"Skriv en kommentar…", cmtSend:"Send",
    cmtSent:"Kommentar sendt ✓", cmtFail:"Kunne ikke sende — prøv igen",

const trCo=(s,lang)=>s.split(" / ").map(p=>{
  const en=COUNTRY[p]||p;
  return lang==="fr" ? (COUNTRY_FR[en]||en) : lang==="en" ? en : p;
}).join(" / ");
/* oversæt en engelsk meta-liste (me) til fransk */
const FRWORDS=[[/^Dir\. /,"Mise en scène : "],[/^With /,"Avec "],[/\bmusic\b/g,"musique"],[/\bdance\b/g,"danse"],
  [/\bfarewell\b/g,"adieu"],[/\bmagic\b/g,"magie"],[/\bstreet\b/g,"rue"],[/\ball day \/ roaming\b/g,"toute la journée"],
  [/~30 participants from several countries/,"~30 participants de plusieurs pays"],[/\bfilms?\b/g,"films"]];
const metaFr=me=>me.map(x=>{
  let s=x.split(" / ").map(p=>COUNTRY_FR[p]||p).join(" / ");
  FRWORDS.forEach(([re,rep])=>s=s.replace(re,rep));
  return s;
});

  canterville:"Comédie familiale de fantômes d'après Oscar Wilde. Le fantôme est un avatar animé en 3D en direct, unique au monde, qui signe en langue des signes internationale et en suédois parlé — et peine à effrayer une famille qui n'a peur de rien. Avec Jamila Ouahid (qui anime le fantôme), Robert Fransson, Johan Kankkonen & Mette Marqvardsen.",
  lastones:"Dystopie du futur proche : un nouvel ordre mondial propose un « remède » qui éradique le handicap. Quatre jeunes sourds fuient un traitement forcé qui les priverait de langue, de culture et d'identité. Avec Ronny Patrick Jacobsen, Dawn Jani Birley et d'autres.",
  fifthwall:"Spectacle avec Mira Zuckermann (Teater Manu). Mira Zuckermann anime aussi la conférence « Building a Theatre » (vendredi 11h00), et une séance de dédicace de son livre a lieu en lien avec le spectacle.",

const FESTDATES={ "2026-07-02":"thu","2026-07-03":"fri","2026-07-04":"sat","2026-07-05":"sun" };
const _today=new Date(), _iso=`${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,"0")}-${String(_today.getDate()).padStart(2,"0")}`;
const todayKey=FESTDATES[_iso]||null;
if(todayKey)curDay=todayKey;
const nowMin=()=>{const n=new Date();let v=n.getHours()*60+n.getMinutes();if(n.getHours()<6)v+=1440;return v;};
const isLive=it=>todayKey===curDay && toMin(it.start)<=nowMin() && nowMin()<toMin(it.end);
let activeCats=new Set(Object.keys(CATS));
const toMin=t=>{const[h,m]=t.split(":").map(Number);let v=h*60+m;if(h<6)v+=1440;return v;};
const isNight=t=>Number(t.split(":")[0])<6;
const L=v=>(v && typeof v==="object" && !Array.isArray(v) && ("da" in v || "en" in v || "fr" in v)) ? (v[curLang] ?? v.en ?? v.da) : v;
const cMeta=x=>curLang==="fr" ? metaFr(x.me||x.m) : curLang==="en" ? (x.me||x.m) : x.m;
const cDesc=x=>curLang==="fr" ? (x.dfr||x.de||x.d) : curLang==="en" ? (x.de||x.d) : x.d;

/* ---------- favoritter (gemt i browseren) ---------- */
let FAVS=new Set();
try{FAVS=new Set(JSON.parse(localStorage.getItem("cdo2026_favs")||"[]"));}catch(e){}
const saveFavs=()=>{try{localStorage.setItem("cdo2026_favs",JSON.stringify([...FAVS]));}catch(e){}};
function mkItem(e,ei,s,day){
  const cd=e.ref?C[e.ref]:null;
  return {cat:e.cat,start:s[0],end:s[1],tag:s[2],
    title:e.ref?L(cd.t):L(e.label),sub:e.ref?cd.fr:"",desc:e.ref?cDesc(cd):"",meta:e.ref?cMeta(cd):null,
    note:L(e.note),dur:e.dur,opt:e.opt,img:e.ref?cd.img:e.img,cid:e.ref||e.cid||null,fav:`${ei}@${day}@${s[0]}`};
}
function updateMinTab(){
  const b=document.querySelector('.vbtn[data-v="min"]');
  if(b)b.textContent=`${UI[curLang].vMin}`+(FAVS.size?` (${FAVS.size})`:"");
}
/* ---------- konflikt-tjek ---------- */
const favParse=key=>{const[ei,day,start]=key.split("@");return{ei:+ei,day,start};};
function favSlot(key){
  const f=favParse(key), slots=(EV[f.ei]&&EV[f.ei].slots[f.day])||[];
  const s=slots.find(x=>x[0]===f.start);
  return s?{...f,end:s[1]}:null;
}
const evTitle=ei=>{const e=EV[ei]; if(!e)return""; return e.ref?L(C[e.ref].t):L(e.label);};
const overlaps=(a,b)=>a.day===b.day && toMin(a.start)<toMin(b.end) && toMin(b.start)<toMin(a.end);
function favIssues(key,set){
  const me=favSlot(key); if(!me)return{dup:false,conflicts:[]};
  let dup=false; const conflicts=[];
  for(const k of set){
    if(k===key)continue;
    const o=favSlot(k); if(!o)continue;
    if(o.ei===me.ei)dup=true;
    else if(overlaps(me,o))conflicts.push(evTitle(o.ei));
  }
  return{dup,conflicts};
}

function toggleFav(key,el){
  const adding=!FAVS.has(key);
  if(adding)FAVS.add(key); else FAVS.delete(key);
  saveFavs();
  if(el){const on=FAVS.has(key); el.classList.toggle("on",on); el.textContent=on?"★":"☆";}
  updateMinTab();
  if(adding){
    const iss=favIssues(key,FAVS);
    if(iss.dup)toast(UI[curLang].dup);
    else if(iss.conflicts.length)toast(UI[curLang].conflictWith(iss.conflicts[0]));
  }
  if(curView==="min")renderMin();
}

let SHARED=null, sharedBy="", minMode="own";
(function(){
  try{
    const q=new URLSearchParams(location.search), pl=q.get("plan");
    if(pl){ SHARED=new Set(decodeURIComponent(escape(atob(pl))).split(",").filter(Boolean)); sharedBy=(q.get("by")||"").slice(0,40); minMode="shared"; }
  }catch(e){ SHARED=null; }
})();
const pageUrl=()=>location.origin+location.pathname;
function planUrl(name){
  const data=[...FAVS].join(",");
  let u=pageUrl()+"?plan="+encodeURIComponent(btoa(unescape(encodeURIComponent(data))));
  if(name)u+="&by="+encodeURIComponent(name);
  return u;
}
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";document.body.appendChild(t);}
  t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2400);
}
async function shareUrl(url,title){
  if(navigator.share){ try{ await navigator.share({title,url}); return; }catch(e){ if(e&&e.name==="AbortError")return; } }
  try{ await navigator.clipboard.writeText(url); toast(UI[curLang].copied); }
  catch(e){ prompt(UI[curLang].copied, url); }
}
function sharePage(){ shareUrl(pageUrl(), UI[curLang].title); }
function sharePlan(){
  if(!FAVS.size){ toast(UI[curLang].noFav); return; }
  let name=""; try{ name=localStorage.getItem("cdo2026_name")||""; }catch(e){}
  if(!name){ name=(prompt(UI[curLang].namePrompt,"")||"").trim(); if(name){ try{localStorage.setItem("cdo2026_name",name);}catch(e){} } }
  shareUrl(planUrl(name), UI[curLang].myPlan);
}
function setMinMode(m){ minMode=m; renderMin(); }
function addSharedToPlan(){
  if(!SHARED)return;
  SHARED.forEach(k=>FAVS.add(k)); saveFavs(); minMode="own"; updateMinTab(); renderMin(); toast(UI[curLang].added);
}

}

  el.querySelectorAll(".day").forEach(n=>n.onclick=()=>{curDay=n.dataset.k;buildDays();renderTL();});

function buildFilters(){
  const el=document.getElementById("filters");
  let h=Object.entries(CATS).map(([k,c])=>`<span class="chip ${(allMode||activeCats.has(k))?'':'off'}" data-k="${k}"><span class="dot" style="background:${c.color}"></span>${L(c.name)}</span>`).join("");
  if(!allMode)h+=`<span class="chip reset" data-reset="1">↺ ${UI[curLang].reset}</span>`;
  el.innerHTML=h;
  el.querySelectorAll(".chip").forEach(n=>n.onclick=()=>{
    if(n.dataset.reset){allMode=true;activeCats=new Set(Object.keys(CATS));}
    else{const k=n.dataset.k;
      if(allMode){allMode=false;activeCats=new Set([k]);}
      else{activeCats.has(k)?activeCats.delete(k):activeCats.add(k); if(activeCats.size===0)allMode=true;}
    }
    buildFilters();renderTL();
  });
}
function renderTL(){
  const items=[];
  for(let ei=0;ei<EV.length;ei++){
    const e=EV[ei];
    if(!(allMode||activeCats.has(e.cat)))continue;
    const slots=e.slots[curDay]; if(!slots)continue;
    for(const s of slots){
      if(curGroup!=="all" && s[2] && s[2]!==curGroup) continue;
      items.push(mkItem(e,ei,s,curDay));
    }
  }
  items.sort((a,b)=>toMin(a.start)-toMin(b.start)||a.cat.localeCompare(b.cat));
  const di=DAYS.find(d=>d.k===curDay);
  let html=`<div class="sechead">${UI[curLang].dayProgram} · ${L(di.full)}</div>`;
  if(!items.length){
    html+=`<div class="empty">${UI[curLang].empty}</div>`;
  }else{
    html+=items.map(it=>{
      const c=CATS[it.cat],night=isNight(it.start),hasDesc=!!(it.desc||it.meta),on=FAVS.has(it.fav),live=isLive(it);
      return `<div class="row"><div class="time">${it.start}<span class="to">${it.end}${night?' +1':''}</span></div>
      <div class="card ${hasDesc?'exp':''} ${live?'live':''}" style="--cc:${c.color}" ${hasDesc?'onclick="this.classList.toggle(\'open\')"':''}>
        <span class="star ${on?'on':''}" title="${UI[curLang].fav}" onclick="event.stopPropagation();toggleFav('${it.fav}',this)">${on?'★':'☆'}</span>
        ${it.img?`<img class="thumb" src="${it.img}" alt="" loading="lazy">`:''}
        <div class="cbody">
        <div class="ctag">${L(c.name)}</div>
        <div class="title">${it.title}${it.sub?` <span style="font-weight:400;color:var(--muted);font-size:12px">· ${it.sub}</span>`:''}</div>
        <div class="meta">
          ${live?`<span class="nowb">${UI[curLang].now}</span>`:''}
          <a class="maplink" href="${gmaps(VEN[c.ven])}" target="_blank" rel="noopener">📍 ${L(c.venue)}</a>
          ${it.dur?`<span>${it.dur}</span>`:''}
          ${it.tag?`<span class="grp">${it.tag}</span>`:''}
          ${it.opt?`<span class="opt">${UI[curLang].optional}</span>`:''}
          ${night?`<span class="night">${UI[curLang].afterMid}</span>`:''}
          <span>${c.pass}</span>
        </div>
        ${it.note?`<div class="meta" style="margin-top:4px"><span>${it.note}</span></div>`:''}
        ${hasDesc?`<div class="more">${UI[curLang].tapDesc}</div>
          <div class="desc">${it.meta?`<div class="dl" style="margin-bottom:4px">${it.meta.join(" · ")}</div>`:''}${it.desc||''}</div>`:''}
        ${it.cid?`<div class="more cmt-toggle" onclick="event.stopPropagation();openComments('${it.cid}',this)">💬 ${UI[curLang].comments}</div>
          <div class="cmts" style="display:none" onclick="event.stopPropagation()"></div>`:''}
        </div>
      </div></div>`;
    }).join("");
  }
  document.getElementById("daymeta").textContent=UI[curLang].daymeta(items.length,L(di.full));
  document.getElementById("tl").innerHTML=html;
}

function renderMin(){
  const el=document.getElementById("view-min");
  const u=UI[curLang];
  const shared=(minMode==="shared" && SHARED);
  const useSet=shared ? SHARED : FAVS;
  let total=0, conflictSum=0;
  const blocks=DAYS.map(d=>{
    const items=[];
    for(let ei=0;ei<EV.length;ei++){
      const e=EV[ei],slots=e.slots[d.k]; if(!slots)continue;
      for(const s of slots){const key=`${ei}@${d.k}@${s[0]}`; if(useSet.has(key))items.push(mkItem(e,ei,s,d.k));}
    }
    if(!items.length)return "";
    items.sort((a,b)=>toMin(a.start)-toMin(b.start)||a.cat.localeCompare(b.cat));
    total+=items.length;
    items.forEach(it=>{const iss=favIssues(it.fav,useSet); it.dup=iss.dup; it.conflicts=iss.conflicts; conflictSum+=iss.conflicts.length;});
    return `<div class="dayblock"><div class="dayhd">${L(d.full)}</div>`+items.map(it=>planCardHTML(it,!shared)).join("")+`</div>`;
  }).join("");
  const conflictPairs=Math.round(conflictSum/2);
  const h2=shared ? `${u.sharedPlan}${sharedBy?` · ${sharedBy}`:''}` : u.myPlan;
  let html="";
  if(SHARED){
    html+=`<div class="minmode">`+
      `<span class="mm ${!shared?'on':''}" onclick="setMinMode('own')">${u.myPlan}</span>`+
      `<span class="mm ${shared?'on':''}" onclick="setMinMode('shared')">${u.sharedPlan}${sharedBy?` · ${sharedBy}`:''}</span>`+
    `</div>`;
  }
  html+=`<div class="minhead"><div><h2>${h2}</h2><div class="minsub">${u.planSub(total)}</div></div><div class="mactions">`;
  if(total){
    if(shared) html+=`<button class="printbtn alt" onclick="addSharedToPlan()">${u.addToPlan}</button>`;
    else html+=`<button class="printbtn alt" onclick="sharePlan()">${u.sharePlan}</button>`;
    html+=`<button class="printbtn" onclick="window.print()">${u.printPDF}</button>`;
  }
  html+=`</div></div>`;
  if(conflictPairs>0)html+=`<div class="plan-warn">${u.conflictSummary(conflictPairs)}</div>`;
  html+= total ? blocks : `<div class="empty">${shared?u.emptyShared:u.noFav}</div>`;
  el.innerHTML=html;
}
function planCardHTML(it,editable){
  const c=CATS[it.cat],night=isNight(it.start),hasWarn=it.dup||(it.conflicts&&it.conflicts.length);
  return `<div class="pcard ${hasWarn?'warn':''}" style="--cc:${c.color}">
    <div class="ptime">${it.start}<span>${it.end}${night?' +1':''}</span></div>
    ${it.img?`<img class="pthumb" src="${it.img}" alt="" loading="lazy">`:''}
    <div class="pbody">
      <div class="pcat">${L(c.name)}${it.tag?` · ${it.tag}`:''}${it.opt?` · ${UI[curLang].optional}`:''}${night?` · ${UI[curLang].afterMid}`:''}</div>
      <div class="ptitle">${it.title}${it.sub?` <span class="fr">· ${it.sub}</span>`:''}</div>
      <div class="pv">📍 ${L(c.venue)}${it.dur?` · ${it.dur}`:''} · ${c.pass}</div>
      ${it.meta?`<div class="pm">${it.meta.join(" · ")}</div>`:''}
      ${it.dup?`<div class="warnb">${UI[curLang].dupShort}</div>`:''}
      ${it.conflicts&&it.conflicts.length?`<div class="warnb">${UI[curLang].conflictWith(it.conflicts[0])}</div>`:''}
      ${it.desc?`<div class="pd">${it.desc}</div>`:''}
      ${it.note?`<div class="pn">${it.note}</div>`:''}
    </div>
    ${editable?`<button class="premove" title="${UI[curLang].remove}" onclick="toggleFav('${it.fav}')">★</button>`:''}
  </div>`;
}

    comedie:{da:"IN-teater · cinema · ceremonier",en:"IN theatre · cinema · ceremonies",fr:"Théâtre IN · cinéma · cérémonies"},
    atelier:{da:"OFF-forestillinger",en:"OFF performances",fr:"Spectacles OFF"},
    village:{da:"Village: konferencer · street · Deaf Party",en:"Village: conferences · street · Deaf Party",fr:"Village : conférences · rue · Deaf Party"},
  };
  html+=["comedie","atelier","village"].map(id=>{const v=VEN[id];return `<div class="item" style="--cc:#334155">
      <div class="t">${v.n}</div>
      <div class="m"><span>${v.a}</span><span>${L(venueUse[id])}</span></div>
      <a class="maplink" style="margin-top:5px" href="${gmaps(v)}" target="_blank" rel="noopener">📍 ${T.openMaps}</a></div>`;}).join("");

  html+=`</div>`;
  el.innerHTML=html;
}

/* ---------- kommentarer ---------- */
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtAt=iso=>{try{const d=new Date(iso);return `${d.getDate()}/${d.getMonth()+1} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}catch(e){return"";}};
function openComments(cid,btn){
  const panel=btn.nextElementSibling;
  if(panel.dataset.loaded){panel.style.display=panel.style.display==="none"?"":"none";return;}
  panel.dataset.loaded="1"; panel.style.display="";
  panel.innerHTML=`<div class="cmt-load">${UI[curLang].cmtLoading}</div>`;
  renderCmtPanel(panel,cid);
}
async function renderCmtPanel(panel,cid){
  const u=UI[curLang];
  let list;
  try{
    const r=await fetch(`/api/comments?show=${encodeURIComponent(cid)}`);
    if(!r.ok)throw 0;
    list=(await r.json()).comments||[];
  }catch(e){panel.innerHTML=`<div class="cmt-err">${u.cmtUnavailable}</div>`;return;}
  let name=""; try{name=localStorage.getItem("cdo2026_name")||"";}catch(e){}
  panel.innerHTML=
    (list.length
      ? list.map(c=>`<div class="cmt"><b>${esc(c.name)||u.cmtAnon}</b><span class="cmt-at">${fmtAt(c.created_at)}</span><div>${esc(c.text)}</div></div>`).join("")
      : `<div class="cmt-empty">${u.cmtEmpty}</div>`)
    +`<form class="cmt-form" onsubmit="submitCmt(event,'${cid}')">
        <input type="text" name="name" maxlength="40" placeholder="${u.cmtName}" value="${esc(name)}">
        <textarea name="text" maxlength="500" required placeholder="${u.cmtPlaceholder}"></textarea>
        <input class="cmt-hp" type="text" name="hp" tabindex="-1" autocomplete="off">
        <button type="submit">${u.cmtSend}</button>
      </form>`;
}
async function submitCmt(ev,cid){
  ev.preventDefault(); ev.stopPropagation();
  const f=ev.target, btn=f.querySelector("button");
  const text=f.text.value.trim(); if(text.length<2)return;
  btn.disabled=true;
  try{
    const r=await fetch("/api/comments",{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify({show:cid,name:f.name.value.trim(),text,hp:f.hp.value})});
    if(!r.ok)throw 0;
    try{if(f.name.value.trim())localStorage.setItem("cdo2026_name",f.name.value.trim());}catch(e){}
    toast(UI[curLang].cmtSent);
    renderCmtPanel(f.closest(".cmts"),cid);
  }catch(e){toast(UI[curLang].cmtFail); btn.disabled=false;}
}

function setView(v){
  curView=v;
  document.querySelectorAll(".vbtn").forEach(b=>b.classList.toggle("active",b.dataset.v===v));
  document.getElementById("view-tl").style.display = v==="tl"?"":"none";
  document.getElementById("view-cat").style.display = v==="cat"?"":"none";
  document.getElementById("view-min").style.display = v==="min"?"":"none";
  if(v==="min")renderMin();
}
document.querySelectorAll(".vbtn").forEach(b=>b.onclick=()=>setView(b.dataset.v));

let guideHidden=false;
try{guideHidden=localStorage.getItem("cdo2026_guide")==="1";}catch(e){}
function renderGuide(){
  const el=document.getElementById("guide"); if(!el)return;
  if(guideHidden){el.style.display="none"; el.innerHTML=""; return;}
  el.style.display="";
  const u=UI[curLang];
  el.innerHTML=`<button class="gclose" title="${u.hide}" onclick="hideGuide()">✕</button><h3>${u.guideTitle}</h3><ul>${u.guide.map(g=>`<li>${g}</li>`).join("")}</ul>`;
}
function hideGuide(){guideHidden=true; try{localStorage.setItem("cdo2026_guide","1");}catch(e){} renderGuide();}

function applyLang(){
  const u=UI[curLang];
  document.documentElement.lang=curLang;
  document.title=u.title;
  document.getElementById("kicker").textContent=u.kicker;
  document.getElementById("sub").textContent=u.sub;
  document.querySelector('.vbtn[data-v="tl"]').textContent=u.vTL;
  document.querySelector('.vbtn[data-v="cat"]').textContent=u.vCat;
  updateMinTab();
  document.getElementById("sharePageBtn").innerHTML="⤴ "+u.share;
  document.getElementById("footer").innerHTML=u.footer;
  document.querySelectorAll("#langsel .lang").forEach(b=>b.classList.toggle("active",b.dataset.l===curLang));
  renderGuide();
  buildDays();buildFilters();buildGroup();renderTL();renderCat();renderMin();
}
document.querySelectorAll("#langsel .lang").forEach(b=>b.onclick=()=>{curLang=b.dataset.l;try{localStorage.setItem("cdo2026_lang",curLang);}catch(e){} applyLang();});

applyLang();
if(SHARED) setView("min");
</script>
</body>
</html>
